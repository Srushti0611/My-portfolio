<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Resume</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 20px;
            background: #111827;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
        }

        .header a {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 18px;
            background: #38bdf8;
            color: black;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .header a:hover {
            background: #0ea5e9;
        }

        /* PDF VIEWER */
        .resume-container {
            width: 100%;
            height: calc(100vh - 100px);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <h1>My Resume</h1>

        <!-- Download Button -->
        <a href="resume.pdf" download>
            Download Resume
        </a>

        <!-- Open in new tab -->
        <a href="assests/Srushti_Sagare f.pdf" target="_blank">
            Open PDF
        </a>
    </div>

    <!-- PDF VIEWER -->
    <div class="resume-container">
        <iframe src="resume.pdf"></iframe>
    </div>

</body>
</html>
